<mat-card appearance="outlined" class="header-card">
    <div class="container-header">
        <h1>Game list</h1>
        <span class="spacer"></span>
        <button matFab extended routerLink="/games/add">
            <mat-icon>add</mat-icon>
            Add new game
        </button>
    </div>
</mat-card>
<mat-card appearance="outlined" class="table-list">

    <mat-form-field class="search-field" appearance="outline">
        <mat-label>Search for a game</mat-label>
        <mat-icon matPrefix>search</mat-icon>
        <input matInput type="text" [(ngModel)]="searchValue" (ngModelChange)="onSearchChanged()">
        @if (searchValue) {
        <button matSuffix matIconButton aria-label="Clear" (click)="searchValue=''; onSearchChanged()">
            <mat-icon>close</mat-icon>
        </button>
        }
    </mat-form-field>

    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

        <ng-container matColumnDef="img">
            <th mat-header-cell *matHeaderCellDef>Image</th>
            <td mat-cell *matCellDef="let game">
                <img class="table-img" [src]="game.imgUrl">
            </td>
        </ng-container>

        <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Name</th>
            <td mat-cell *matCellDef="let game"> {{game.name}} </td>
        </ng-container>

        <ng-container matColumnDef="type">
            <th mat-header-cell *matHeaderCellDef>Type</th>
            <td mat-cell *matCellDef="let game"> <mat-chip>{{game.type}}</mat-chip> </td>
        </ng-container>

        <ng-container matColumnDef="publisher">
            <th mat-header-cell *matHeaderCellDef>Publisher</th>
            <td mat-cell *matCellDef="let game"> {{game.publisher}} </td>
        </ng-container>

        <ng-container matColumnDef="completed">
            <th mat-header-cell *matHeaderCellDef>Story completed</th>
            <td mat-cell *matCellDef="let game">
                @if(game.completed) {
                <mat-icon>check_circle</mat-icon>
                }
                @else {
                <mat-icon>cancel</mat-icon>
                }
            </td>
        </ng-container>

        <ng-container matColumnDef="completion-rate">
            <th mat-header-cell *matHeaderCellDef>Completion rate</th>
            <td mat-cell *matCellDef="let game">
                {{game.completionRate}}%<mat-progress-bar mode="determinate"
                    [value]="game.completionRate"></mat-progress-bar>
            </td>
        </ng-container>

        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef></th>
            <td mat-cell *matCellDef="let game">
                <div class="container-action">
                    <button matIconButton [routerLink]="['/', 'games', game.uuid ,'edit']">
                        <mat-icon>edit</mat-icon>
                    </button>
                    <button matIconButton (click)="onDelete(game.uuid)">
                        <mat-icon>delete</mat-icon>
                    </button>                
                </div>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    <mat-paginator [pageSizeOptions]="[10, 20]"></mat-paginator>
</mat-card>
