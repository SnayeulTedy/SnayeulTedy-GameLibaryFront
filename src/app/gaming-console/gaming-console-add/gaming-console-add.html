<mat-card appearance="outlined" class="detail-card">
    <mat-card-header class="container-row">
        <div mat-card-avatar>
            <button matMiniFab aria-label="Example icon button with a menu icon" routerLink="/consoles">
                <mat-icon>chevron_left</mat-icon>
            </button>
        </div>
        <h2>Add a gaming console</h2>
    </mat-card-header>
</mat-card>

<mat-card appearance="outlined" class="detail-card">
    <mat-card-header class="container-row">
        <mat-card-title>Gaming console informations</mat-card-title>
    </mat-card-header>
    <mat-card-content>

        <form [formGroup]="form" (submit)="onSubmit()">

            <div class="column">

                <div class="row">
                    <mat-form-field appearance="outline" class="size-100">
                        <mat-label>Name</mat-label>
                        <input matInput formControlName="name">
                    </mat-form-field>
                </div>
                <div class="row">
                    <mat-form-field appearance="outline" class="size-100">
                        <mat-label>Constructor</mat-label>
                        <input matInput formControlName="constructor">
                    </mat-form-field>

                </div>

                <div class="row">
                    <mat-form-field appearance="outline" class="grow-2">
                        <mat-label>Release Year</mat-label>
                        <input matInput formControlName="releaseYear">
                    </mat-form-field>
                    <mat-form-field appearance="outline">
                        <mat-label>Power (TFlops)</mat-label>
                        <input matInput formControlName="powerTFlops">
                    </mat-form-field>

                </div>
                <div class="row">
                    <mat-form-field appearance="outline" class="size-100">
                        <mat-label>Image URL</mat-label>
                        <input matInput formControlName="imgUrl">
                    </mat-form-field>
                </div>

                <div class="row">
                    <mat-form-field appearance="outline" class="size-100">
                        <mat-label>Description</mat-label>
                        <textarea matInput formControlName="description"></textarea>
                    </mat-form-field>
                </div>

                <div class="footer">
                    <button matFab extended [disabled]="form.invalid">
                        <mat-icon>add</mat-icon>
                        Create
                    </button>
                </div>
            </div>

        </form>

    </mat-card-content>
</mat-card>
